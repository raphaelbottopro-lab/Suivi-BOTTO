<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Budget Botto">
<title>Budget Botto</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg1:#ffffff;--bg2:#f2f2f7;--bg3:#f2f2f7;
  --tx1:#1c1c1e;--tx2:#8e8e93;
  --bd1:#e5e5ea;--bd2:#c7c7cc;
  --r1:12px;--r2:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg1:#1c1c1e;--bg2:#2c2c2e;--bg3:#000;--tx1:#fff;--tx2:#8e8e93;--bd1:#38383a;--bd2:#48484a;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg3);padding-bottom:calc(72px + env(safe-area-inset-bottom));padding-top:env(safe-area-inset-top)}
.app{max-width:430px;margin:0 auto}
.nav{display:flex;background:var(--bg1);border-top:.5px solid var(--bd1);position:fixed;bottom:0;left:0;right:0;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;padding:10px 0 8px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--tx2);font-family:var(--font)}
.nb.on{color:#185FA5}.nb i{font-size:22px}
.scr{display:none;padding:14px}.scr.on{display:block}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mnav{background:transparent;border:none;cursor:pointer;color:var(--tx2);font-size:18px;padding:8px}
.mnav:disabled{opacity:.3;cursor:default}
.mtitle{font-size:17px;font-weight:500;color:var(--tx1);cursor:pointer}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px}
.scard{background:var(--bg2);border-radius:var(--r2);padding:12px}
.slbl{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.sval{font-size:19px;font-weight:500;color:var(--tx1)}
.g{color:#1D9E75!important}.r{color:#D85A30!important}.b{color:#185FA5!important}
.card{background:var(--bg1);border-radius:var(--r1);border:.5px solid var(--bd1);overflow:hidden;margin-bottom:10px}
.ch{display:flex;align-items:center;padding:13px;cursor:pointer;gap:10px}
.ch.open{border-bottom:.5px solid var(--bd1)}
.ci{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cn{flex:1;min-width:0}
.ct{font-size:14px;font-weight:500;color:var(--tx1)}
.cs{font-size:11px;color:var(--tx2);margin-top:1px}
.cv{font-size:15px;font-weight:500;white-space:nowrap}
.cc{font-size:16px;color:var(--tx2);transition:transform .2s;flex-shrink:0}
.cc.open{transform:rotate(180deg)}
.cb{display:none}.cb.open{display:block}
.row{display:flex;align-items:center;padding:11px 13px;border-bottom:.5px solid var(--bd1);gap:8px}
.row:last-child{border-bottom:none}
.ri{flex:1;min-width:0}
.rn{font-size:13px;font-weight:500;color:var(--tx1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rm{font-size:11px;color:var(--tx2);margin-top:1px;display:flex;gap:6px;align-items:center}
.ra{font-size:13px;font-weight:500;white-space:nowrap}
.rb{background:transparent;border:none;cursor:pointer;color:var(--tx2);font-size:17px;padding:6px;flex-shrink:0}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ab{display:flex;align-items:center;gap:6px;padding:11px 13px;cursor:pointer;color:#185FA5;font-size:12px;font-weight:500;border:none;background:transparent;width:100%}
.ab i{font-size:15px}
.csh{padding:13px;border-bottom:.5px solid var(--bd1)}
.cbr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cbl{font-size:12px;color:var(--tx2)}
.cbv{font-size:13px;font-weight:500}
.cpb{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:4px}
.cpf{height:100%;border-radius:3px}
.cpc{font-size:10px;color:var(--tx2);text-align:right}
.sr{display:flex;align-items:center;padding:11px 13px;border-bottom:.5px solid var(--bd1);gap:10px}
.sr:last-child{border-bottom:none}
.sl{flex:1;min-width:0}
.sln{font-size:13px;font-weight:500;color:var(--tx1)}
.sls{font-size:11px;color:var(--tx2);margin-top:1px}
.sbg{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;flex-shrink:0}
.sbg.ok{background:#E1F5EE;color:#0F6E56}
.sbg.over{background:#FAECE7;color:#993C1D}
.sbg.pend{background:#F1EFE8;color:#5F5E5A}
.sa{font-size:14px;font-weight:500;color:var(--tx1);text-align:right;white-space:nowrap}
.sa.over{color:#D85A30}.sa.ok{color:#1D9E75}
.seb{background:transparent;border:none;cursor:pointer;color:var(--tx2);font-size:17px;padding:6px;flex-shrink:0}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sh{background:var(--bg1);border-radius:20px 20px 0 0;padding:20px 18px calc(36px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.shn{width:36px;height:4px;border-radius:2px;background:var(--bd2);margin:0 auto 18px}
.sha{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.shd{background:transparent;border:none;cursor:pointer;color:#D85A30;font-size:14px;display:flex;align-items:center;gap:4px;font-family:var(--font);padding:0}
.fg{margin-bottom:13px}
.fl{font-size:12px;color:var(--tx2);margin-bottom:5px;display:block}
.fi{width:100%;padding:10px 12px;border-radius:var(--r2);border:.5px solid var(--bd2);background:var(--bg2);font-size:15px;color:var(--tx1);font-family:var(--font)}
.fs{width:100%;padding:10px 12px;border-radius:var(--r2);border:.5px solid var(--bd2);background:var(--bg2);font-size:15px;color:var(--tx1);font-family:var(--font)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{padding:6px 12px;border-radius:20px;border:.5px solid var(--bd2);font-size:12px;cursor:pointer;background:var(--bg2);color:var(--tx2)}
.chip.on{background:#185FA5;color:#fff;border-color:#185FA5}
.sbtn{width:100%;padding:14px;border-radius:var(--r1);border:none;background:#185FA5;color:#fff;font-size:16px;font-weight:500;cursor:pointer;margin-top:6px;font-family:var(--font)}
.stl{font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px;padding:0 2px}
.pt{background:var(--bg1);border-radius:var(--r1);border:.5px solid var(--bd1);padding:18px;margin-bottom:14px;text-align:center}
.ptl{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.ptv{font-size:30px;font-weight:500;color:var(--tx1)}
.ptv.g{color:#1D9E75}.ptv.r{color:#D85A30}
.pts{font-size:12px;color:var(--tx2);margin-top:4px}
.pr{display:flex;align-items:center;padding:11px 13px;border-bottom:.5px solid var(--bd1);gap:10px}
.pr:last-child{border-bottom:none}
.pi{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.pn{flex:1;min-width:0}
.pa{font-size:13px;font-weight:500;color:var(--tx1)}
.pb{font-size:11px;color:var(--tx2)}
.pv{font-size:13px;font-weight:500;white-space:nowrap}
.pe{font-size:11px;margin-left:4px}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:4px 0 8px}
.cm{padding:11px 6px;border-radius:var(--r2);border:.5px solid var(--bd1);background:var(--bg2);text-align:center;cursor:pointer;font-size:13px;color:var(--tx1)}
.cm.on{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}
.cy{font-size:14px;font-weight:500;color:var(--tx1);margin:12px 0 6px}
.dc{border-radius:var(--r2);padding:10px 13px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.dc.up{background:#E1F5EE}.dc.down{background:#FAECE7}.dc.flat{background:var(--bg2)}
.dl{font-size:12px;flex:1}
.dl.up{color:#0F6E56}.dl.down{color:#993C1D}.dl.flat{color:var(--tx2)}
.dv{font-size:14px;font-weight:500}
.dv.up{color:#1D9E75}.dv.down{color:#D85A30}.dv.flat{color:var(--tx2)}
.nb-banner{background:var(--bg2);border-radius:var(--r2);padding:10px 13px;margin-bottom:10px;font-size:12px;color:var(--tx2);text-align:center}
.er{display:flex;gap:8px;margin-top:12px}
.eb{flex:1;padding:12px;border-radius:var(--r1);font-size:13px;cursor:pointer;font-family:var(--font)}
</style>
</head>
<body>
<div class="app">
  <div class="scr on" id="scr-budget">
    <div class="mhdr">
      <button class="mnav" id="bpm" onclick="chgMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <div class="mtitle" id="mdisp">Mai 2026</div>
      <button class="mnav" onclick="chgMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="nmb"></div>
    <div class="sgrid">
      <div class="scard"><div class="slbl">Revenus</div><div class="sval g" id="trev">0 €</div></div>
      <div class="scard"><div class="slbl">Dépenses</div><div class="sval r" id="tdep">0 €</div></div>
      <div class="scard"><div class="slbl">Solde</div><div class="sval b" id="tsol">0 €</div></div>
      <div class="scard"><div class="slbl">Épargne</div><div class="sval b" id="tepa">0 €</div></div>
    </div>
    <div id="bcats"></div>
  </div>

  <div class="scr" id="scr-patrim">
    <div class="mhdr">
      <button class="mnav" onclick="chgPM(-1)"><i class="ti ti-chevron-left"></i></button>
      <div class="mtitle" id="pmd" onclick="openCal()">Mai 2026 <i class="ti ti-calendar" style="font-size:14px;vertical-align:-1px"></i></div>
      <button class="mnav" onclick="chgPM(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="pt"><div class="ptl">Patrimoine net</div><div class="ptv" id="pnet">0 €</div><div class="pts" id="psub"></div></div>
    <div id="peb"></div>
    <div class="sgrid">
      <div class="scard"><div class="slbl">Comptes</div><div class="sval b" id="pcpt">0 €</div></div>
      <div class="scard"><div class="slbl">Épargne</div><div class="sval g" id="pepa">0 €</div></div>
      <div class="scard"><div class="slbl">Immo</div><div class="sval g" id="pimm">0 €</div></div>
      <div class="scard"><div class="slbl">Passifs</div><div class="sval r" id="ppas">0 €</div></div>
    </div>
    <div id="psecs"></div>
  </div>

  <div class="scr" id="scr-histo">
    <div class="stl" style="margin-top:4px">Opérations — <span id="hm">Mai 2026</span></div>
    <div class="card" id="hlist"></div>
    <div class="er">
      <button class="eb" style="border:.5px solid #185FA5;background:transparent;color:#185FA5" onclick="exportData()"><i class="ti ti-download"></i> Exporter JSON</button>
      <button class="eb" style="border:.5px solid var(--bd1);background:var(--bg2);color:var(--tx1)" onclick="document.getElementById('imf').click()"><i class="ti ti-upload"></i> Importer JSON</button>
      <input type="file" id="imf" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<div class="nav">
  <button class="nb on" onclick="go('budget')" id="tnb-budget"><i class="ti ti-wallet"></i>Budget</button>
  <button class="nb" onclick="go('patrim')" id="tnb-patrim"><i class="ti ti-chart-line"></i>Patrimoine</button>
  <button class="nb" onclick="go('histo')" id="tnb-histo"><i class="ti ti-history"></i>Historique</button>
</div>

<div class="ov" id="ov" onclick="closeOv(event)">
  <div class="sh">
    <div class="shn"></div>
    <div class="sha">
      <div id="sht" style="font-size:16px;font-weight:500;color:var(--tx1)">Ajouter</div>
      <button class="shd" id="shdb" style="display:none" onclick="execDel()"><i class="ti ti-trash" style="font-size:16px"></i> Supprimer</button>
    </div>
    <div id="shb"></div>
  </div>
</div>

<script>
const MN=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MS=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
const MM=4,MY=2026;

const CATS=[
  {key:'revenus',label:'Revenus',icon:'ti-currency-euro',bg:'#EAF3DE',col:'#3B6D11',ac:'g',sign:'+',nd:true,ns:true},
  {key:'charges',label:'Charges fixes',icon:'ti-home-2',bg:'#FAECE7',col:'#993C1D',ac:'r',sign:'−'},
  {key:'abonnements',label:'Abonnements',icon:'ti-device-mobile',bg:'#E1F5EE',col:'#0F6E56',ac:'r',sign:'−'},
  {key:'courses',label:'Courses',icon:'ti-shopping-cart',bg:'#FAEEDA',col:'#854F0B',ac:'r',sign:'−',sp:'courses'},
  {key:'epargne',label:'Épargne',icon:'ti-trending-up',bg:'#E6F1FB',col:'#185FA5',ac:'b',sign:'−'},
  {key:'plaisirs',label:'Plaisirs & Autres',icon:'ti-confetti',bg:'#FBEAF0',col:'#993556',ac:'r',sign:'−',sd:true},
];

const PI={
  compte:{bg:'#E6F1FB',col:'#185FA5',ic:'ti-credit-card'},
  livret:{bg:'#E1F5EE',col:'#0F6E56',ic:'ti-pig-money'},
  pea:{bg:'#EEEDFE',col:'#534AB7',ic:'ti-chart-bar'},
  av:{bg:'#FAEEDA',col:'#854F0B',ic:'ti-shield'},
  ldd:{bg:'#E6F1FB',col:'#185FA5',ic:'ti-building-bank'},
  immo:{bg:'#FAECE7',col:'#993C1D',ic:'ti-building'},
  passif:{bg:'#FCEBEB',col:'#A32D2D',ic:'ti-receipt'}
};
function piH(t){const i=PI[t]||{bg:'#F1EFE8',col:'#5F5E5A',ic:'ti-circle'};return`<div class="pi" style="background:${i.bg}"><i class="ti ${i.ic}" style="color:${i.col}"></i></div>`;}

function dsk(d){if(!d)return 9999;const p=d.split('/');if(p.length!==2)return 9999;return parseInt(p[1])*100+parseInt(p[0]);}
function si(c,a){if(!c.sd)return a;return[...a].sort((x,y)=>dsk(x.date)-dsk(y.date));}
function bk(m,y){return y+'-'+(m+1<10?'0':'')+(m+1);}

let cm=4,cy=2026,pm=4,py=2026,eid=null,es=null,dc=null;
let ocm={};
function goc(){const k=bk(cm,cy);if(!ocm[k])ocm[k]=new Set();return ocm[k];}

function baseBudget(){return{
  revenus:[{id:1,nom:'Alternance',montant:952.16,compte:'CM'},{id:2,nom:'Papa',montant:100,compte:'CM'},{id:3,nom:'Maman',montant:214,compte:'CM'},{id:4,nom:'Papy',montant:300,compte:'CM'},{id:5,nom:'APL',montant:199,compte:'CM'},{id:6,nom:'Mobili-Jeune',montant:100,compte:'CM'}],
  charges:[{id:10,nom:'Loyer 14 Rue du Loup',montant:488.84,compte:'CM',date:'01/05',statut:'Débité'},{id:11,nom:'EDF',montant:47,compte:'CM',date:'07/05',statut:'Débité'},{id:12,nom:'Assurance habitation',montant:9.89,compte:'CM',date:'04/05',statut:'Débité'},{id:13,nom:'Intérêts prêt étudiant',montant:34.81,compte:'CM',date:'08/05',statut:'Débité'},{id:14,nom:'Cotisations Crédit Mutuel',montant:3.5,compte:'CM',date:'05/05',statut:'Débité'},{id:15,nom:'Bourso Prévoyance',montant:2,compte:'Bourso',date:'01/05',statut:'Débité'},{id:16,nom:'Bourso Métal',montant:9.9,compte:'Bourso',date:'10/05',statut:'Débité'},{id:17,nom:'Assurly',montant:59.33,compte:'CM',date:'03/05',statut:'Débité'}],
  abonnements:[{id:20,nom:'Box Bouygues',montant:23.99,compte:'CM',date:'03/05',statut:'Débité'},{id:21,nom:'Forfait Bouygues',montant:13.99,compte:'CM',date:'03/05',statut:'Débité'},{id:22,nom:'Canal+',montant:22,compte:'CM',date:'05/05',statut:'Débité'},{id:23,nom:'UGC',montant:11.95,compte:'CM',date:'04/05',statut:'Débité'},{id:24,nom:'Claude AI',montant:21.6,compte:'CM',date:'02/05',statut:'Débité'},{id:25,nom:'TBM (tram)',montant:20.8,compte:'CM',date:'03/05',statut:'Débité'},{id:26,nom:'Apple Cloud',montant:0.99,compte:'CM',date:'14/05',statut:'Débité'}],
  courses:{previsionnel:250,virementSem:62.5,semaines:[{id:'s1',label:'Semaine 1',reel:null},{id:'s2',label:'Semaine 2',reel:null},{id:'s3',label:'Semaine 3',reel:null},{id:'s4',label:'Semaine 4',reel:null}]},
  epargne:[{id:40,nom:'Virement Livret Jeune',montant:200,compte:'CM',date:'08/05',statut:'Fait'},{id:41,nom:'Virement PEA',montant:0,compte:'CM',date:'',statut:'Planifié'}],
  plaisirs:[{id:66,nom:'Bière avec Lu',montant:8.5,compte:'Bourso',date:'03/05',statut:'Débité'},{id:65,nom:'Pressing Chartrons',montant:8.72,compte:'Bourso',date:'04/05',statut:'Débité'},{id:55,nom:'Soirée au Lord',montant:34,compte:'Bourso',date:'05/05',statut:'Débité'},{id:54,nom:'Régent avec Lu',montant:33.8,compte:'Bourso',date:'06/05',statut:'Débité'},{id:53,nom:'Cadeau Lu',montant:37.8,compte:'Bourso',date:'09/05',statut:'Débité'},{id:59,nom:'Cigare anniv Lu',montant:10,compte:'Bourso',date:'10/05',statut:'Débité'},{id:51,nom:'Palatino',montant:53.58,compte:'Bourso',date:'11/05',statut:'Débité'},{id:52,nom:'Berthus avec les copains',montant:55,compte:'Bourso',date:'11/05',statut:'Débité'},{id:56,nom:'Médicaments',montant:20.18,compte:'Bourso',date:'11/05',statut:'Débité'},{id:57,nom:'Confiserie UGC',montant:16.1,compte:'Bourso',date:'11/05',statut:'Débité'},{id:58,nom:'Globe avec Vince',montant:16.05,compte:'CM',date:'11/05',statut:'Débité'},{id:60,nom:'Coiffeur',montant:30,compte:'Bourso',date:'11/05',statut:'Débité'},{id:61,nom:'Petit dej chez Karl',montant:15.9,compte:'Bourso',date:'11/05',statut:'Débité'},{id:62,nom:'Brunch au Karl',montant:23,compte:'Bourso',date:'11/05',statut:'Débité'},{id:64,nom:'Cigare',montant:9,compte:'Bourso',date:'11/05',statut:'Débité'},{id:67,nom:'St Georges avec Vince',montant:8,compte:'Bourso',date:'11/05',statut:'Débité'},{id:68,nom:'Ciné UGC avec Max',montant:8,compte:'CM',date:'11/05',statut:'Débité'},{id:73,nom:'Café Max House of Parliament',montant:2.1,compte:'Bourso',date:'11/05',statut:'Débité'},{id:50,nom:'Soirée anniv Lu au Lord',montant:89.5,compte:'Bourso',date:'12/05',statut:'Débité'},{id:74,nom:'Chocolatine',montant:5.3,compte:'Bourso',date:'12/05',statut:'Débité'},{id:63,nom:'Crème à raser Horace',montant:9,compte:'Bourso',date:'13/05',statut:'Débité'},{id:69,nom:'Macdo Moulleau',montant:5.7,compte:'Bourso',date:'14/05',statut:'Débité'},{id:70,nom:'Milkshake au Moulleau',montant:5.9,compte:'Bourso',date:'14/05',statut:'Débité'},{id:71,nom:'Café avec Lu au Moulleau',montant:6.5,compte:'Bourso',date:'14/05',statut:'Débité'},{id:72,nom:'Achat café Moulleau',montant:5,compte:'Bourso',date:'14/05',statut:'Débité'}],
};}

function newMonth(prev){
  const p=JSON.parse(JSON.stringify(prev));
  ['charges','abonnements'].forEach(k=>{p[k].forEach(i=>{i.statut='Planifié';i.date='';});});
  p.plaisirs=[];
  p.courses.semaines.forEach(s=>{s.reel=null;});
  p.epargne.forEach(i=>{i.statut='Planifié';i.date='';});
  return p;
}

const DD=()=>({
  budgets:{'2026-05':baseBudget()},

function gcb(){
  const k=bk(cm,cy);
  if(!D.budgets[k]){
    let p=cm-1,y=cy;if(p<0){p=11;y--;}
    const pb=D.budgets[bk(p,y)];
    D.budgets[k]=pb?newMonth(pb):baseBudget();
    D.budgets[k]._isNew=true;sv();
  }
  return D.budgets[k];
}

function fmt(n){return parseFloat(n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}
function fmk(n){return Math.round(n).toLocaleString('fr-FR')+' €'}
function nid(){return++D.nextId}
function sk(m,y){return y+'-'+(m+1<10?'0':'')+(m+1)}
function ta(s){if(!s)return 0;return[...s.comptes,...s.epargne,...s.immobilier].reduce((a,x)=>a+x.valeur,0);}
function ct(b){const c=b.courses;return c.semaines.filter(s=>s.reel!==null).reduce((a,x)=>a+x.reel,0)+c.semaines.filter(s=>s.reel===null).length*c.virementSem;}

function rcb(b,open){
  const c=b.courses,tot=ct(b),prev=c.previsionnel;
  const pct=Math.min(100,Math.round(tot/prev*100));
  const bc=tot>prev?'#D85A30':tot<prev?'#1D9E75':'#EF9F27';
  const sai=c.semaines.filter(s=>s.reel!==null).length,eco=prev-tot;
  let h=`<div class="ch${open?' open':''}" onclick="tc('courses')">
    <div class="ci" style="background:#FAEEDA"><i class="ti ti-shopping-cart" style="color:#854F0B"></i></div>
    <div class="cn"><div class="ct">Courses</div><div class="cs">${sai}/4 semaines · Bourso</div></div>
    <div class="cv r">−${fmt(tot)}</div>
    <i class="ti ti-chevron-down cc${open?' open':''}"></i>
  </div>
  <div class="cb${open?' open':''}">
    <div class="csh">
      <div class="cbr"><span class="cbl">Prévu</span><span class="cbv" style="color:var(--tx2)">${fmt(prev)}</span></div>
      <div class="cbr"><span class="cbl">Réel estimé</span><span class="cbv" style="color:${bc}">${fmt(tot)}</span></div>
      ${eco!==0?`<div class="cbr"><span class="cbl">${eco>0?'Économie':'Dépassement'}</span><span class="cbv" style="color:${eco>0?'#1D9E75':'#D85A30'}">${eco>0?'−':'+'} ${fmt(Math.abs(eco))}</span></div>`:''}
      <div class="cpb"><div class="cpf" style="width:${pct}%;background:${bc}"></div></div>
      <div class="cpc">${pct}% du budget utilisé</div>
    </div>`;
  c.semaines.forEach((sem,i)=>{
    const hs=sem.reel!==null,df=hs?sem.reel-c.virementSem:null;
    const ov=df!==null&&df>0,un=df!==null&&df<0;
    let bc2='pend',bl='À venir';if(hs){bc2=ov?'over':'ok';bl=ov?'Dépassé':'Économie';}
    h+=`<div class="sr">
      <div class="sl"><div class="sln">${sem.label}</div><div class="sls">virement ${fmt(c.virementSem)}</div></div>
      <span class="sbg ${bc2}">${bl}</span>
      <div class="sa${ov?' over':un?' ok':''}">${hs?fmt(sem.reel):'—'}</div>
      <button class="seb" onclick="osE(${i})"><i class="ti ti-edit"></i></button>
    </div>`;
  });
  h+='</div>';return h;
}

function renderB(){
  const b=gcb(),oc=goc();
  document.getElementById('nmb').innerHTML=b._isNew?`<div class="nb-banner">✨ Nouveau mois créé depuis le mois précédent — plaisirs et courses remis à zéro</div>`:'';
  let rv=0,dp=0,ep=0,h='';
  CATS.forEach(cat=>{
    const op=oc.has(cat.key);
    if(cat.sp==='courses'){h+=`<div class="card">${rcb(b,op)}</div>`;dp+=ct(b);return;}
    const raw=b[cat.key]||[],its=si(cat,raw),tot=raw.reduce((a,x)=>a+x.montant,0);
    if(cat.key==='revenus')rv=tot;else if(cat.key==='epargne')ep=tot;else dp+=tot;
    h+=`<div class="card"><div class="ch${op?' open':''}" onclick="tc('${cat.key}')">
      <div class="ci" style="background:${cat.bg}"><i class="ti ${cat.icon}" style="color:${cat.col}"></i></div>
      <div class="cn"><div class="ct">${cat.label}</div><div class="cs">${its.length} ligne${its.length>1?'s':''}</div></div>
      <div class="cv ${cat.ac}">${cat.sign}${fmk(tot)}</div>
      <i class="ti ti-chevron-down cc${op?' open':''}"></i>
    </div><div class="cb${op?' open':''}">`;
    its.forEach(item=>{
      const meta=cat.ns?item.compte||'':[item.compte,item.date,item.statut].filter(Boolean).join(' · ');
      const dot=cat.ns?'':sdot(item.statut||'');
      h+=`<div class="row"><div class="ri"><div class="rn">${item.nom}</div><div class="rm">${dot} ${meta}</div></div>
        <div class="ra ${cat.ac}">${cat.sign}${fmt(item.montant)}</div>
        <button class="rb" onclick="oE('${cat.key}',${item.id})"><i class="ti ti-edit"></i></button></div>`;
    });
    h+=`<button class="ab" onclick="oA('${cat.key}')"><i class="ti ti-plus"></i>Ajouter</button></div></div>`;
  });
  document.getElementById('bcats').innerHTML=h;
  dp+=ep;const sol=rv-dp;
  document.getElementById('trev').textContent=fmk(rv);
  document.getElementById('tdep').textContent=fmk(dp);
  document.getElementById('tepa').textContent=fmk(ep);
  const se=document.getElementById('tsol');
  se.textContent=(sol>=0?'+':'')+fmk(Math.abs(sol));se.className='sval '+(sol>=0?'g':'r');
  document.getElementById('bpm').disabled=(cy===MY&&cm===MM);
}

function gpd(){const k=sk(pm,py);return D.patrimoine.snapshots[k]||D.patrimoine.current;}
function gppd(){
  let p=pm-1,y=py;if(p<0){p=11;y--;}
  const ks=Object.keys(D.patrimoine.snapshots).sort(),t=sk(p,y),av=ks.filter(k=>k<=t);
  if(!av.length)return null;return D.patrimoine.snapshots[av[av.length-1]];
}

function renderP(){
  const snap=gpd(),prev=gppd();
  const ed=(sk(pm,py)==='2026-05'||!D.patrimoine.snapshots[sk(pm,py)]);
  function ps(items,sec,cls,isp){
    let h='';
    items.forEach(item=>{
      let ev='';
      if(prev&&!isp){const a=prev[sec]||[],p=a.find(x=>x.id===item.id);if(p){const df=item.valeur-p.valeur;if(Math.abs(df)>0.5){const sg=df>0?'+':'';const ec=df>0?'#1D9E75':'#D85A30';ev=`<span class="pe" style="color:${ec}">${sg}${fmk(df)}</span>`;}}}
      h+=`<div class="pr">
        ${piH(item.type)}
        <div class="pn"><div class="pa">${item.nom}</div><div class="pb">${item.banque}</div></div>
        <div style="text-align:right"><div class="pv ${cls}">${isp?'−':''}${fmt(item.valeur)}</div>${ev}</div>
        ${ed?`<button class="rb" onclick="oEP('${sec}',${item.id})"><i class="ti ti-edit"></i></button>`:''}
      </div>`;
    });
    if(ed)h+=`<button class="ab" onclick="oAP('${sec}')"><i class="ti ti-plus"></i>Ajouter</button>`;
    return h;
  }
  const tC=snap.comptes.reduce((a,x)=>a+x.valeur,0),tE=snap.epargne.reduce((a,x)=>a+x.valeur,0),tI=snap.immobilier.reduce((a,x)=>a+x.valeur,0),tP=snap.passifs.reduce((a,x)=>a+x.valeur,0),tA=tC+tE+tI,net=tA-tP;
  document.getElementById('pcpt').textContent=fmk(tC);
  document.getElementById('pepa').textContent=fmk(tE);
  document.getElementById('pimm').textContent=fmk(tI);
  document.getElementById('ppas').textContent=fmk(tP);

  // Patrimoine net : signe + couleur explicites
  const pn=document.getElementById('pnet');
  if(net<0){pn.textContent='−'+fmk(Math.abs(net));pn.className='ptv r';}
  else if(net>0){pn.textContent='+'+fmk(net);pn.className='ptv g';}
  else{pn.textContent='0 €';pn.className='ptv';}

  document.getElementById('psub').textContent=`Actifs : ${fmk(tA)} · Passifs : ${fmk(tP)}`;
  let bn='';
  if(prev){const pa=ta(prev),df=tA-pa,pc=(pa>0?(df/pa*100):0).toFixed(1),cl=df>0?'up':df<0?'down':'flat',sg=df>0?'+':'';bn=`<div class="dc ${cl}"><i class="ti ${df>0?'ti-trending-up':df<0?'ti-trending-down':'ti-minus'}" style="font-size:20px;color:${df>0?'#1D9E75':df<0?'#D85A30':'#888780'}"></i><div class="dl ${cl}">Évolution vs mois précédent</div><div class="dv ${cl}">${sg}${fmk(df)} (${sg}${pc}%)</div></div>`;}
  document.getElementById('peb').innerHTML=bn;
  const secs=[{t:'Comptes courants',id:'comptes',cls:'b',p:false},{t:'Épargne',id:'epargne',cls:'g',p:false},{t:'Immobilier',id:'immobilier',cls:'g',p:false},{t:'Passifs',id:'passifs',cls:'r',p:true}];
  let ph='';secs.forEach(s=>{ph+=`<div class="stl">${s.t}</div><div class="card">${ps(snap[s.id],s.id,s.cls,s.p)}</div>`;});
  if(!ed)ph+=`<div style="font-size:11px;color:var(--tx2);text-align:center;padding:8px 0 4px">Données historiques — lecture seule</div>`;
  document.getElementById('psecs').innerHTML=ph;
}

function oE(section,id){
  const b=gcb(),item=b[section].find(x=>x.id===id);eid=id;es=section;
  openOv('Modifier',bForm(item,section),()=>{const b2=gcb();b2[es]=b2[es].filter(x=>x.id!==eid);sv();render();});
}
function svB(){
  const nom=document.getElementById('fn').value.trim(),montant=parseFloat(document.getElementById('fm').value)||0;
  const de=document.getElementById('fd'),date=de?de.value.trim():'';
  const compte=document.getElementById('fc').value;
  const ste=document.getElementById('fst'),statut=ste?ste.value:'';
  const ce=document.querySelector('#shb .chip.on'),cat=ce?ce.dataset.cat:es;
  if(!nom)return;
  const b=gcb();
  const obj={id:nid(),nom,montant,compte};if(date)obj.date=date;if(statut)obj.statut=statut;
  if(es!==cat&&eid!==null){b[es]=b[es].filter(x=>x.id!==eid);b[cat].push(obj);}
  else if(eid!==null){const a=b[es],i=a.findIndex(x=>x.id===eid);if(i>=0)a[i]={...a[i],nom,montant,date,compte,statut};}
  else{b[cat].push(obj);goc().add(cat);}
  sv();render();closeOv();
}

function pForm(item,section){
  const types={comptes:[{k:'compte',v:'Compte courant'}],epargne:[{k:'livret',v:'Livret Jeune'},{k:'pea',v:'PEA'},{k:'av',v:'Assurance Vie'},{k:'ldd',v:'LDD'}],immobilier:[{k:'immo',v:'Immobilier'}],passifs:[{k:'passif',v:'Passif / Crédit'}]};
  const tc=(types[section]||[]).map((t,i)=>`<div class="chip${item?item.type===t.k?' on':'':i===0?' on':''}" onclick="selChip(this)" data-type="${t.k}">${t.v}</div>`).join('');
  return`<div class="fg"><label class="fl">Type</label><div class="chips">${tc}</div></div>
    <div class="fg"><label class="fl">Nom</label><input class="fi" id="fn" value="${item?item.nom:''}" placeholder="Ex: Livret A"></div>
    <div class="fg"><label class="fl">Valeur (€)</label><input class="fi" id="fv" type="number" step="0.01" value="${item?item.valeur:''}" placeholder="0.00" inputmode="decimal"></div>
    <div class="fg"><label class="fl">Banque / Plateforme</label><input class="fi" id="fb" value="${item?item.banque:''}" placeholder="Ex: Crédit Mutuel"></div>
    <button class="sbtn" onclick="svP('${section}')">Enregistrer</button>`;
}
function oAP(section){eid=null;es=section;openOv('Nouvel actif',pForm(null,section),null);}
function oEP(section,id){
  const item=D.patrimoine.current[section].find(x=>x.id===id);eid=id;es=section;
  openOv('Modifier',pForm(item,section),()=>{D.patrimoine.current[es]=D.patrimoine.current[es].filter(x=>x.id!==eid);D.patrimoine.snapshots['2026-05']=JSON.parse(JSON.stringify(D.patrimoine.current));sv();renderP();});
}
function svP(section){
  const nom=document.getElementById('fn').value.trim(),valeur=parseFloat(document.getElementById('fv').value)||0,banque=document.getElementById('fb').value.trim();
  const te=document.querySelector('#shb .chip.on'),type=te?te.dataset.type:'compte';
  if(!nom)return;
  if(eid!==null){const a=D.patrimoine.current[section],i=a.findIndex(x=>x.id===eid);if(i>=0)a[i]={...a[i],nom,valeur,banque,type};}
  else D.patrimoine.current[section].push({id:nid(),nom,valeur,banque,type});
  D.patrimoine.snapshots['2026-05']=JSON.parse(JSON.stringify(D.patrimoine.current));
  sv();closeOv();renderP();
}

function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='budget_botto_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{D=JSON.parse(ev.target.result);sv();render();}catch(err){alert('Fichier JSON invalide');}};
  r.readAsText(file);e.target.value='';
}
render();
</script>
